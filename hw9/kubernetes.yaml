apiVersion: apps/v1
kind: Deployment
metadata:
  name: hw9-web-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hw9-web-server
  template:
    metadata:
      labels:
        app: hw9-web-server
    spec:
      containers:
      - name: server
        # Replace [PROJECT_ID] with your actual project ID in the final command
        image: gcr.io/cs528-485615/hw9-server:v1
        ports:
        - containerPort: 8080
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: "cs528-485615"
---
apiVersion: v1
kind: Service
metadata:
  name: hw9-web-server-service
spec:
  type: LoadBalancer
  selector:
    app: hw9-web-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
